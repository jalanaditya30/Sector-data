name: refresh-heatmap
on:
  schedule:
    # NSE trading hours are 09:15-15:30 IST (UTC+5:30) on weekdays.
    # Hourly at :15 IST from 09:15 to 15:15 (03:45-09:45 UTC), plus a close snapshot at 15:30 IST (10:00 UTC).
    - cron: "45 3-9 * * 1-5"
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python build_heatmap.py
      - name: commit data.json
        run: |
          git config user.name  "heatmap-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: refresh $(date -u +%FT%TZ)"
          git push
