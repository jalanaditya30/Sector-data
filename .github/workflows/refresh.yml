name: refresh-heatmap
on:
  schedule:
    # Hourly at :35 IST from 09:35 to 15:35 on weekdays (IST = UTC+5:30, so
    # 04:05-10:05 UTC). GitHub queues cron in UTC and may delay a run by
    # 5-15 min under load, so treat these as "on/around" times, not exact.
    - cron: "5 4-10 * * 1-5"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python build_heatmap.py
      - name: commit data.json
        run: |
          git config user.name  "heatmap-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: refresh $(date -u +%FT%TZ)"
          git push
