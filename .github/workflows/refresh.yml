name: refresh-heatmap
on:
  schedule:
    # Target: hourly refresh 09:35-15:35 IST on weekdays (IST = UTC+5:30).
    # GitHub's scheduler is best-effort and skips individual slots outright
    # (observed ~50-75% skip rate on this repo), so schedule TWO independent
    # slots per hour — :20 and :35 IST — to raise the odds that every hour
    # gets at least one refresh. Runs are idempotent and serialized by the
    # concurrency group below, so a double-fire is harmless.
    - cron: "50 3-9 * * 1-5"    # 09:20-15:20 IST
    - cron: "5 4-10 * * 1-5"    # 09:35-15:35 IST
  workflow_dispatch:
  # external pinger hook: POST https://api.github.com/repos/<owner>/<repo>/dispatches
  # with body {"event_type":"refresh"} and a PAT that has contents:write.
  # Lets a free scheduler like cron-job.org guarantee hourly refreshes even
  # when GitHub's own cron skips a slot.
  repository_dispatch:
    types: [refresh]
permissions:
  contents: write
# never let two refreshes run at once — overlapping runs race on git push
concurrency:
  group: refresh-heatmap
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python build_heatmap.py
      - name: commit data.json
        run: |
          git config user.name  "heatmap-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: refresh $(date -u +%FT%TZ)"
          git push
